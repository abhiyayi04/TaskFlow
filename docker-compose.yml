services:
  mysql:
    image: mysql:8.4
    container_name: taskflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: taskflow
      MYSQL_USER: taskflow
      MYSQL_PASSWORD: taskflow
    ports:
      - "3307:3306"
    volumes:
      - taskflow_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "taskflow", "-ptaskflow"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  taskflow_mysql_data:
